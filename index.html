<!DOCTYPE html>
<html>
	<head>
		<title>ImAGuyLikeCodin's website</title>
		<link rel="icon" href="https://avatars.githubusercontent.com/u/97346078">
		<meta charset="UTF-8">
		<meta content="ImAGuyLikeCodin's website" property="og:title" />
		<meta content="Never hosted a website on Github before so i decided to try it" property="og:description" />
		<meta content="https://nguyenwasd72.github.io/website" property="og:url" />
		<meta content="https://avatars.githubusercontent.com/u/97346078" property="og:image" />
		<meta content="#8cb0ed" data-react-helmet="true" name="theme-color" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<style>
			* {
				font-family: Arial;
				margin: 0;
				padding: 0
			}
		
			#welcome {
				background-color: #8cb0ed;
				width: 100%;
				overflow: hidden;
				position: fixed;
				height: 200px;
				transition: height 0.5s ease
			}

			#welcome-texts {
				color: white;
				position: relative;
				margin-left: 50px;
				margin-top: 20px;
				font-size: 30px;
				transition: opacity 0.5s ease
			}

			#welcome.shrink {
				height: 50px
			}
			
			#welcome-texts.hide {
				opacity: 0
			}

			#shrinked {
				position: absolute;
				top: 10px;
				left: 50px;
				color: white;
				font-size: 25px;
				opacity: 0;
				transition: opacity 0.5s ease
			}

			#shrinked.show {
				opacity: 1
			}

			#spacer {
				height: 202px
			}
		
			#content {
				display: flex;
				flex-wrap: wrap;
				align-items: flex-start;
				gap: 20px
			}

			#social, #things {
				display: flex;
				flex-direction: column;
				margin-left: 2px;
				width: fit-content;
				outline: 3px solid black
			}
			
			#things {
				flex-grow: 1
			}
			
			#thing {
				display: flex;
				flex-direction: row;
				flex-wrap: wrap;
				gap: 10px
			}

			#medias {
				display: flex;
				align-items: center
			}
		
			#countdown {
				display: grid;
				place-items: center;
				outline: 2px solid black;
				margin-left: 4px;
				margin-top: 4px;
				width: fit-content
			}

			@media (max-width: 768px) {
				h1:not(.ignore) {
					font-size: 24px
				}
				#welcome-texts {
					margin-left: 20px;
					font-size: 21px
				}
				#social, #things {
					outline: 2px solid black
				}
				#shrinked {
					left: 30px;
					font-size: 20px
				}
			}
		</style>
	</head>
	<body>
		<div id="welcome">
			<div id="welcome-texts">
				<h1 class="ignore">Hello!</h1>
				<p>Welcome to my website! I'm Nguyên aka ImAGuyLikeCodin</p>
				<p>This is just the introduction of me and my website so go explore</p>
			</div>
			<p id="shrinked">ImAGuyLikeCodin's website</p>
		</div>
		<div id="spacer"></div>
		<div id="content">
			<div id="things">
				<h1 style="font-weight: normal;">Cool things I made:</h1>
				<div id="thing">
					<div id="countdown">
						<p>A normal 10 minutes countdown</p>
						<a href="https://nguyenwasd72.github.io/countdown" style="text-decoration: none;">
							<div id="timer" style="background-color: black; display: flex; align-items: baseline; width: 160px; height: 40px;">
								<h1 class="ignore" id="time" style="font-family: Calibri, sans-serif; color: lime; margin-left: 5px; margin-top: 0;">10:00</h1>
								<p style="font-family: Calibri, sans-serif; color: lime; font-size: x-large; font-weight: bold; margin: 0;">.00</p>
							</div>
						</a>
						<p style="font-size: 15px">Inspired by <a href="https://youtu.be/FTUdUAfcsfY" target="_blank" rel="noopener noreferrer">DougDoug's 10 minutes stream</a></p>
					</div>
				</div>
			</div>
			<div id="social">
				<h2 style="font-weight: normal;">My social:</h2>
				<div id="medias">
					<div id="twitter">
						<a href="https://twitter.com/ImAGuyLikeCodin/">
							<img src="https://raw.githubusercontent.com/Nguyenwasd72/Nguyenwasd72/main/icons/twitter.png" alt="we are not calling this x" style="width:50px; height:50px;">
						</a>
					</div>
					<div id="reddit">
						<a href="https://reddit.com/user/KNguyen_8442">
							<img src="https://raw.githubusercontent.com/Nguyenwasd72/Nguyenwasd72/main/icons/reddit.png" alt="reddit" style="width:50px; height:50px">
						</a>
					</div>
					<div id="discord">
						<a href="https://discord.com/users/884019263160062002">
							<img src="https://raw.githubusercontent.com/Nguyenwasd72/Nguyenwasd72/main/icons/discord.png" alt="discord" style="width:50px; height:50px">
						</a>
					</div>
					<div id="github">
						<a href="https://github.com/Nguyenwasd72/">
							<img src="https://raw.githubusercontent.com/Nguyenwasd72/nguyenwasd72.github.io/main/github.png" alt="github" style="width:50px; height:50px;">
						</a>
					</div>
				</div>
			</div>
		</div>
		<div style="height: 1000px"><!--scroll test--></div>
		<script>
			const welcome = document.getElementById("welcome")
			const welcomeTexts = document.getElementById("welcome-texts")
			const shrinked = document.getElementById("shrinked")
			window.addEventListener("scroll", () => {
				welcome.classList.toggle("shrink", window.scrollY > 50)
				welcomeTexts.classList.toggle("hide", window.scrollY > 50)
				shrinked.classList.toggle("show", window.scrollY > 50)
			})
		</script>
	</body>
</html>
